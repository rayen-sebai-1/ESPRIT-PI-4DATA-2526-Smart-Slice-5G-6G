global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "telemetry-exporter"
    static_configs:
      - targets: ["telemetry-exporter:9091"]
    metrics_path: /metrics

  - job_name: "adapter-ves"
    static_configs:
      - targets: ["adapter-ves:7001"]
    metrics_path: /metrics

  - job_name: "adapter-netconf"
    static_configs:
      - targets: ["adapter-netconf:7002"]
    metrics_path: /metrics
