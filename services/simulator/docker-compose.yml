---
# neuroslice-sim Docker Compose
# Run: cd services/simulator && docker compose up --build
# Each service uses the simulator root as build context so shared/ is accessible.

x-python-service: &python-service
  volumes:
    - ./scenarios:/scenarios:ro   # scenario JSON files

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Adapters ──────────────────────────────────────────────────────────────

  adapter-ves:
    build:
      context: .                          # root = services/simulator/
      dockerfile: adapter-ves/Dockerfile
    <<: *python-service
    ports:
      - "${VES_PORT:-7001}:7001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: adapter-ves
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
    depends_on:
      redis:
        condition: service_healthy

  adapter-netconf:
    build:
      context: .
      dockerfile: adapter-netconf/Dockerfile
    <<: *python-service
    ports:
      - "${NETCONF_PORT:-7002}:7002"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: adapter-netconf
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
    depends_on:
      redis:
        condition: service_healthy

  # ── Normalizer ────────────────────────────────────────────────────────────

  normalizer:
    build:
      context: .
      dockerfile: normalizer/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: normalizer
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      STREAM_MAXLEN: ${STREAM_MAXLEN:-10000}
    depends_on:
      redis:
        condition: service_healthy

  # ── Fault Engine ──────────────────────────────────────────────────────────

  fault-engine:
    build:
      context: .
      dockerfile: fault-engine/Dockerfile
    <<: *python-service
    ports:
      - "${FAULT_ENGINE_PORT:-7004}:7004"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: fault-engine
      SCENARIOS_DIR: /scenarios
    depends_on:
      redis:
        condition: service_healthy

  # ── Simulators ────────────────────────────────────────────────────────────

  simulator-core:
    build:
      context: .
      dockerfile: simulator-core/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-core
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      VES_ADAPTER_URL: http://adapter-ves:7001
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-ves:
        condition: service_started
      redis:
        condition: service_healthy

  simulator-edge:
    build:
      context: .
      dockerfile: simulator-edge/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-edge
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      NETCONF_ADAPTER_URL: http://adapter-netconf:7002
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-netconf:
        condition: service_started
      redis:
        condition: service_healthy

  simulator-ran:
    build:
      context: .
      dockerfile: simulator-ran/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-ran
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      VES_ADAPTER_URL: http://adapter-ves:7001
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-ves:
        condition: service_started
      redis:
        condition: service_healthy

  # ── API Service ───────────────────────────────────────────────────────────

  api-service:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    <<: *python-service
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: api-service
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      FAULT_ENGINE_URL: http://fault-engine:7004
    depends_on:
      normalizer:
        condition: service_started
      fault-engine:
        condition: service_started

  # ── Telemetry Exporter ────────────────────────────────────────────────────

  telemetry-exporter:
    build:
      context: .
      dockerfile: telemetry-exporter/Dockerfile
    <<: *python-service
    ports:
      - "${EXPORTER_PORT:-9091}:9091"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: telemetry-exporter
    depends_on:
      redis:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - telemetry-exporter

  # ── Grafana ───────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-neuroslice}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/neuroslice_overview.json
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
