name: neuroslice-tunisia

x-app-build: &app-build
  context: .
  dockerfile: infra/docker/service.Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    container_name: neuroslice-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  db-migrate:
    build:
      <<: *app-build
      args:
        SERVICE_MODULE: services.app_service.app.main:app
    env_file:
      - .env
    environment:
      PORT: 8000
      SERVICE_NAME: db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: >
      sh -c "alembic upgrade head &&
      python scripts/export_sla_artifacts.py --save-prepared-dataset &&
      python scripts/export_congestion_artifacts.py &&
      python scripts/export_anomaly_artifacts.py &&
      python scripts/seed_data.py"

  app-service:
    build:
      <<: *app-build
      args:
        SERVICE_MODULE: services.app_service.app.main:app
    env_file:
      - .env
    environment:
      PORT: 8000
      SERVICE_NAME: app-service
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroslice-frontend
    depends_on:
      app-service:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres_data:
