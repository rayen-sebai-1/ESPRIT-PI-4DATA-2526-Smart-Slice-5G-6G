_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: false
      max_age: 3600

services:
  - name: auth-service
    url: http://dashboard-auth-service:8000
    routes:
      - name: auth-route
        paths:
          - /api/auth
        strip_path: true
        methods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS

  - name: api-service
    url: http://dashboard-api-service:8000
    routes:
      - name: dashboard-route
        paths:
          - /api/dashboard
        strip_path: true
        methods:
          - GET
          - OPTIONS
      - name: session-route
        paths:
          - /api/session
        strip_path: true
        methods:
          - GET
          - OPTIONS
      - name: prediction-route
        paths:
          - /api/prediction
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS
