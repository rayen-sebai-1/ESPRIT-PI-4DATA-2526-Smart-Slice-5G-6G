_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600

services:
  - name: auth-service-login
    url: http://auth-service:8001/auth/login
    routes:
      - name: auth-service-login-route
        paths:
          - /api/auth/login
        strip_path: true
        methods:
          - POST
          - OPTIONS
        plugins:
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              minute: 5
              hour: 100
              fault_tolerant: true
              hide_client_headers: false
              error_code: 429
              error_message: Too many login attempts.

  - name: auth-service-auth
    url: http://auth-service:8001/auth
    routes:
      - name: auth-service-auth-route
        paths:
          - /api/auth
        strip_path: true
        methods:
