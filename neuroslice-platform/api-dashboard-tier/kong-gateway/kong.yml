_format_version: "3.0"
_transform: true

###############################################################################
# Global CORS plugin
#
# Origins: localhost:5173 is the Vite dev server / nginx production port.
# To allow an additional deployed origin (e.g. a staging URL), set the
# KONG_EXTRA_CORS_ORIGIN environment variable on the kong-gateway service.
# The docker-entrypoint.sh script replaces the EXTRA_CORS_PLACEHOLDER comment
# with the extra origin entry at container startup.
###############################################################################
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        # EXTRA_CORS_PLACEHOLDER
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600

###############################################################################
# JWT consumers
#
# The auth-service signs tokens with:
#   algorithm: HS256
#   iss claim: "neuroslice-auth"
#   secret:    DASHBOARD_JWT_SECRET
#
# Kong's JWT plugin resolves the consumer by matching the token's `iss` claim
# against the `key` field of the consumer's jwt_secrets.  The `$KONG_JWT_SECRET`
# placeholder is substituted by docker-entrypoint.sh at startup — it is never
# stored in the image.
###############################################################################
consumers:
  - username: neuroslice-dashboard
    jwt_secrets:
      - key: neuroslice-auth
        algorithm: HS256
        secret: "$KONG_JWT_SECRET"

###############################################################################
# Services & Routes
###############################################################################

# ── Auth — public endpoints (no JWT required at gateway level) ───────────────
services:
  - name: auth-service-login
    url: http://auth-service:8001/auth/login
    routes:
      - name: auth-service-login-route
        paths:
          - /api/auth/login
        strip_path: true
        methods:
          - POST
          - OPTIONS
        plugins:
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              minute: 5
              hour: 100
              fault_tolerant: true
              hide_client_headers: false
              error_code: 429
              error_message: Too many login attempts.

  - name: auth-service-auth
    url: http://auth-service:8001/auth
    routes:
      - name: auth-service-auth-route
        paths:
          - /api/auth
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS

# ── Auth — admin user management (JWT required) ───────────────────────────────
  - name: auth-service-users
    url: http://auth-service:8001/users
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          secret_is_base64: false
          run_on_preflight: false
    routes:
      - name: auth-service-users-route
        paths:
          - /api/auth/users
        strip_path: true
        methods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS

# ── Dashboard — all require a valid JWT ──────────────────────────────────────

  - name: dashboard-service-sessions
    url: http://dashboard-backend:8002/sessions
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          secret_is_base64: false
          run_on_preflight: false
    routes:
      - name: dashboard-service-sessions-route
        paths:
          - /api/dashboard/sessions
        strip_path: true
        methods:
          - GET
          - OPTIONS
        plugins:
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              minute: 120
              hour: 5000
              fault_tolerant: true
              hide_client_headers: false
              error_code: 429
              error_message: Too many protected dashboard requests.
          - name: request-transformer
            config:
