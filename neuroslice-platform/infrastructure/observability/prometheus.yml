global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: scenario_b_local

scrape_configs:
  - job_name: 'adapter-ves'
    static_configs:
      - targets: ['adapter-ves:7001']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'adapter-netconf'
    static_configs:
      - targets: ['adapter-netconf:7002']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # drift-monitor exposes neuroslice_drift_* metrics.
  # Active only when the `drift` Docker Compose profile is running.
  # Prometheus will report scrape failures silently if the target is absent.
  - job_name: 'drift-monitor'
    static_configs:
      - targets: ['drift-monitor:7012']
    metrics_path: /metrics
    scrape_interval: 30s
