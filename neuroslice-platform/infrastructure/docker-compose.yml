---
# neuroslice-sim Docker Compose
# Run: cd neuroslice-platform/infrastructure && docker compose up --build
# Each service uses the neuroslice-platform root as build context.

x-python-service: &python-service
  volumes:
    - ../simulation-tier/scenarios:/scenarios:ro   # scenario JSON files

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "ncat", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: neuroslicesecret
      DOCKER_INFLUXDB_INIT_ORG: neuroslice
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: neuroslice_token_12345
    volumes:
      - influxdb_data:/var/lib/influxdb2


  # ── Adapters ──────────────────────────────────────────────────────────────

  adapter-ves:
    build:
      context: ..
      dockerfile: ingestion-tier/adapter-ves/Dockerfile
    <<: *python-service
    ports:
      - "${VES_PORT:-7001}:7001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: adapter-ves
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
    depends_on:
      redis:
        condition: service_healthy

  adapter-netconf:
    build:
      context: ..
      dockerfile: ingestion-tier/adapter-netconf/Dockerfile
    <<: *python-service
    ports:
      - "${NETCONF_PORT:-7002}:7002"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: adapter-netconf
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
    depends_on:
      redis:
        condition: service_healthy

  # ── Normalizer ────────────────────────────────────────────────────────────

  normalizer:
    build:
      context: ..
      dockerfile: ingestion-tier/normalizer/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: normalizer
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      STREAM_MAXLEN: ${STREAM_MAXLEN:-10000}
    depends_on:
      redis:
        condition: service_healthy

  # ── AIOps Runtime Tier ─────────────────────────────────────────────────────

  congestion-detector:
    build:
      context: ..
      dockerfile: aiops-tier/congestion-detector/Dockerfile
    restart: unless-stopped
    volumes:
      - ../mlops-tier/batch-orchestrator:/mlops:ro
    environment:
      SERVICE_NAME: congestion-detector
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      INPUT_STREAM: stream:norm.telemetry
      OUTPUT_STREAM: events.anomaly
      CONSUMER_GROUP: aiops-congestion-group
      CONSUMER_NAME: congestion-detector-01
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: events.anomaly
      INFLUXDB_ENABLED: "true"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
      INFLUX_MEASUREMENT: aiops_congestion
      STATE_PREFIX: aiops:congestion
      CONGESTION_MODEL_PATH: /mlops/models/congestion_5g_lstm_traced.pt
      CONGESTION_PREPROCESSOR_PATH: /mlops/data/processed/preprocessor_congestion_5g.pkl
      CONGESTION_THRESHOLD: ${CONGESTION_THRESHOLD:-0.5}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
      normalizer:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379')), decode_responses=True).ping()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  slice-classifier:
    build:
      context: ..
      dockerfile: aiops-tier/slice-classifier/Dockerfile
    restart: unless-stopped
    volumes:
      - ../mlops-tier/batch-orchestrator:/mlops:ro
    environment:
      SERVICE_NAME: slice-classifier
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      INPUT_STREAM: stream:norm.telemetry
      OUTPUT_STREAM: events.slice.classification
      CONSUMER_GROUP: aiops-slice-group
      CONSUMER_NAME: slice-classifier-01
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: events.slice.classification
      INFLUXDB_ENABLED: "true"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
      INFLUX_MEASUREMENT: aiops_slice_classification
      STATE_PREFIX: aiops:slice_classification
      SLICE_MODEL_NAME: slice-type-lgbm-5g
      MLFLOW_DB_PATH: /mlops/mlflow.db
      MLRUNS_DIR: /mlops/mlruns
      SLICE_LABEL_ENCODER_PATH: /mlops/data/processed/label_encoder_slice_type_5g.pkl
      SLICE_MISMATCH_CONFIDENCE_THRESHOLD: ${SLICE_MISMATCH_CONFIDENCE_THRESHOLD:-0.8}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
      normalizer:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379')), decode_responses=True).ping()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  sla-assurance:
    build:
      context: ..
      dockerfile: aiops-tier/sla-assurance/Dockerfile
    restart: unless-stopped
    volumes:
      - ../mlops-tier/batch-orchestrator:/mlops:ro
    environment:
      SERVICE_NAME: sla-assurance
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      INPUT_STREAM: stream:norm.telemetry
      OUTPUT_STREAM: events.sla
      CONSUMER_GROUP: aiops-sla-group
      CONSUMER_NAME: sla-assurance-01
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: events.sla
      INFLUXDB_ENABLED: "true"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
      INFLUX_MEASUREMENT: aiops_sla
      STATE_PREFIX: aiops:sla
      SLA_MODEL_NAME: sla-xgboost-5g
      MLFLOW_DB_PATH: /mlops/mlflow.db
      MLRUNS_DIR: /mlops/mlruns
      SLA_SCALER_PATH: /mlops/data/processed/scaler_sla_5g.pkl
      SLA_RISK_THRESHOLD: ${SLA_RISK_THRESHOLD:-0.5}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
      normalizer:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379')), decode_responses=True).ping()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Fault Engine ──────────────────────────────────────────────────────────

  fault-engine:
    build:
      context: ..
      dockerfile: simulation-tier/fault-engine/Dockerfile
    <<: *python-service
    ports:
      - "${FAULT_ENGINE_PORT:-7004}:7004"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: fault-engine
      SCENARIOS_DIR: /scenarios
    depends_on:
      redis:
        condition: service_healthy

  # ── Simulators ────────────────────────────────────────────────────────────

  simulator-core:
    build:
      context: ..
      dockerfile: simulation-tier/simulator-core/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-core
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      VES_ADAPTER_URL: http://adapter-ves:7001
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-ves:
        condition: service_started
      redis:
        condition: service_healthy

  simulator-edge:
    build:
      context: ..
      dockerfile: simulation-tier/simulator-edge/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-edge
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      NETCONF_ADAPTER_URL: http://adapter-netconf:7002
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-netconf:
        condition: service_started
      redis:
        condition: service_healthy

  simulator-ran:
    build:
      context: ..
      dockerfile: simulation-tier/simulator-ran/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-ran
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      VES_ADAPTER_URL: http://adapter-ves:7001
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-ves:
        condition: service_started
      redis:
        condition: service_healthy

  # ── API/BFF Service ───────────────────────────────────────────────────────

  api-bff-service:
    build:
      context: ..
      dockerfile: api-dashboard-tier/api-bff-service/Dockerfile
    <<: *python-service
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: api-bff-service
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      FAULT_ENGINE_URL: http://fault-engine:7004
    depends_on:
      normalizer:
        condition: service_started
      congestion-detector:
        condition: service_started
      slice-classifier:
        condition: service_started
      sla-assurance:
        condition: service_started
      fault-engine:
        condition: service_started

  # ── Telemetry Exporter ────────────────────────────────────────────────────

  telemetry-exporter:
    build:
      context: ..
      dockerfile: ingestion-tier/telemetry-exporter/Dockerfile
    <<: *python-service
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: telemetry-norm
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started

  # ── Dashboard Tier (neuroslice-tunisia) ───────────────────────────────────

  dashboard-auth-service:
    build:
      context: ..
      dockerfile: api-dashboard-tier/dashboard-backend/Dockerfile
      args:
        SERVICE_MODULE: auth_service.main:app
    environment:
      JWT_SECRET_KEY: ${DASHBOARD_JWT_SECRET:-neuroslice-draft-secret}
      TOKEN_EXPIRES_HOURS: "12"
      USERS_FILE_PATH: /app/data/users.json
    volumes:
      - ../api-dashboard-tier/dashboard-backend/data:/app/data
    ports:
      - "${DASHBOARD_AUTH_PORT:-8011}:8000"

  dashboard-api-service:
    build:
      context: ..
      dockerfile: api-dashboard-tier/dashboard-backend/Dockerfile
      args:
        SERVICE_MODULE: api_service.main:app
    environment:
      JWT_SECRET_KEY: ${DASHBOARD_JWT_SECRET:-neuroslice-draft-secret}
      TOKEN_EXPIRES_HOURS: "12"
      USERS_FILE_PATH: /app/data/users.json
    volumes:
      - ../api-dashboard-tier/dashboard-backend/data:/app/data
    ports:
      - "${DASHBOARD_API_PORT:-8012}:8000"

  dashboard-kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "off"
    volumes:
      - ../api-dashboard-tier/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "${DASHBOARD_KONG_PORT:-8008}:8000"
    depends_on:
      - dashboard-auth-service
      - dashboard-api-service

  dashboard-frontend:
    build:
      context: ..
      dockerfile: api-dashboard-tier/dashboard-frontend/Dockerfile
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_PROXY_TARGET: http://dashboard-kong:8000
      VITE_AUTH_API_URL: /api/auth
      VITE_SESSION_API_URL: /api/session
      VITE_PREDICTION_API_URL: /api/prediction
      VITE_DASHBOARD_API_URL: /api/dashboard
    ports:
      - "${DASHBOARD_FRONTEND_PORT:-5173}:5173"
    depends_on:
      - dashboard-kong

  # ── Grafana ───────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-neuroslice}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/neuroslice_overview.json
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

volumes:
  redis_data:
  grafana_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  influxdb_data:
