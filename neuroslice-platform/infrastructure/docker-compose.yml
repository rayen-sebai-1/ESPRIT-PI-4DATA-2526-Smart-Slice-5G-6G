---
# NeuroSlice integrated Docker Compose
# Normal runtime:
#   cd neuroslice-platform/infrastructure
#   docker compose up --build
#
# Runtime + Scenario B MLOps:
#   cd neuroslice-platform/infrastructure
#   docker compose --profile mlops up --build
#
# Each service uses the neuroslice-platform root as build context.

x-python-service: &python-service
  volumes:
    - ../simulation-tier/scenarios:/scenarios:ro

x-aiops-mlops-mounts: &aiops-mlops-mounts
  - ../mlops-tier/batch-orchestrator/models:/mlops/models:ro
  - ../mlops-tier/batch-orchestrator/data:/mlops/data:ro
  - ../mlops-tier/batch-orchestrator/mlruns:/mlops/mlruns:ro
  - ../mlops-tier/batch-orchestrator/mlflow.db:/mlops/mlflow.db:ro
  - ../mlops-tier/batch-orchestrator/src:/mlops/src:ro

x-mlops-project-volumes: &mlops-project-volumes
  - ../mlops-tier/batch-orchestrator/models:/app/models
  - ../mlops-tier/batch-orchestrator/data:/app/data
  - ../mlops-tier/batch-orchestrator/reports:/app/reports
  - ../mlops-tier/batch-orchestrator/mlruns:/app/mlruns

x-mlops-runtime-env: &mlops-runtime-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
  MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
  LOG_MONITORING_MODE: ${MLOPS_LOG_MONITORING_MODE:-logstash}
  LOGSTASH_HTTP_URL: http://logstash:8081/predictions
  ES_HOST: http://elasticsearch:9200

services:
  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "ncat", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: neuroslicesecret
      DOCKER_INFLUXDB_INIT_ORG: neuroslice
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: neuroslice_token_12345
    volumes:
      - influxdb_data:/var/lib/influxdb2

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    # Docker volumes persist the initialized database and its passwords.
    # Changing POSTGRES_* or *_DB_* values later will not update existing DB credentials.
    # If this service was already initialized with different credentials, run:
    #   docker compose down -v
    # Then rebuild and restart the services.
    environment:
      POSTGRES_USER: auth_app
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: neuroslice_dashboard
      AUTH_DB_USER: auth_app
      AUTH_DB_PASSWORD: auth_password
      DASHBOARD_DB_USER: ${DASHBOARD_DB_USER:-dashboard_app}
      DASHBOARD_DB_PASSWORD: ${DASHBOARD_DB_PASSWORD:-dashboard_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  mlops-postgres:
    image: postgres:16-alpine
    profiles: ["mlops"]
    environment:
      POSTGRES_USER: ${MLOPS_POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLOPS_POSTGRES_PASSWORD:-mlflow123}
      POSTGRES_DB: ${MLOPS_POSTGRES_DB:-mlflow}
    ports:
      - "${MLOPS_POSTGRES_PORT:-5433}:5432"
    volumes:
      - mlops_postgres_data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - mlflow-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    profiles: ["mlops"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: ["mlops"]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do sleep 2; done &&
      mc mb --ignore-existing local/${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    profiles: ["mlops"]
    depends_on:
      mlops-postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${MLFLOW_TRACKING_PORT:-5000}:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI:-}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-s3://mlflow-artifacts}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}
      MLOPS_POSTGRES_USER: ${MLOPS_POSTGRES_USER:-mlflow}
      MLOPS_POSTGRES_PASSWORD: ${MLOPS_POSTGRES_PASSWORD:-mlflow123}
      MLOPS_POSTGRES_DB: ${MLOPS_POSTGRES_DB:-mlflow}
    networks:
      default:
        aliases:
          - mlflow
    command: >
      /bin/sh -c "
      pip install --no-cache-dir boto3 psycopg2-binary &&
      BACKEND_URI=$${MLFLOW_BACKEND_STORE_URI:-postgresql+psycopg2://$${MLOPS_POSTGRES_USER:-mlflow}:$${MLOPS_POSTGRES_PASSWORD:-mlflow123}@mlops-postgres:5432/$${MLOPS_POSTGRES_DB:-mlflow}} &&
      ARTIFACT_ROOT=$${MLFLOW_ARTIFACT_ROOT:-s3://$${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}} &&
      mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri $$BACKEND_URI --artifacts-destination $$ARTIFACT_ROOT --serve-artifacts
      "
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/', timeout=3).status < 500 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    profiles: ["mlops"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    expose:
      - "9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    profiles: ["mlops"]
    depends_on:
      elasticsearch:
        condition: service_started
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      XPACK_MONITORING_ENABLED: "false"
    expose:
      - "8081"
    volumes:
      - ../mlops-tier/batch-orchestrator/logstash/pipeline:/usr/share/logstash/pipeline:ro

  mlops-api:
    build:
      context: ../mlops-tier/batch-orchestrator
      dockerfile: Dockerfile
    profiles: ["mlops"]
    ports:
      - "${MLOPS_API_PORT:-8010}:8010"
    environment:
      <<: *mlops-runtime-env
      API_PORT: "8010"
    volumes: *mlops-project-volumes
    depends_on:
      mlflow-server:
        condition: service_healthy
      logstash:
        condition: service_started
      elasticsearch:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3)); sys.exit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mlops-worker:
    build:
      context: ../mlops-tier/batch-orchestrator
      dockerfile: Dockerfile
    profiles: ["mlops-worker"]
    restart: "no"
    command: ["make", "pipeline"]
    environment:
      <<: *mlops-runtime-env
      API_PORT: "8010"
    volumes: *mlops-project-volumes
    depends_on:
      mlflow-server:
        condition: service_healthy
      logstash:
        condition: service_started
      elasticsearch:
        condition: service_started

  adapter-ves:
    build:
      context: ..
      dockerfile: ingestion-tier/adapter-ves/Dockerfile
    <<: *python-service
    ports:
      - "${VES_PORT:-7001}:7001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: adapter-ves
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
    depends_on:
      redis:
        condition: service_healthy

  adapter-netconf:
    build:
      context: ..
      dockerfile: ingestion-tier/adapter-netconf/Dockerfile
    <<: *python-service
    ports:
      - "${NETCONF_PORT:-7002}:7002"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: adapter-netconf
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
    depends_on:
      redis:
        condition: service_healthy

  normalizer:
    build:
      context: ..
      dockerfile: ingestion-tier/normalizer/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: normalizer
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      STREAM_MAXLEN: ${STREAM_MAXLEN:-10000}
    depends_on:
      redis:
        condition: service_healthy

  congestion-detector:
    build:
      context: ..
      dockerfile: aiops-tier/congestion-detector/Dockerfile
    restart: unless-stopped
    volumes: *aiops-mlops-mounts
    environment:
      SERVICE_NAME: congestion-detector
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      INPUT_STREAM: stream:norm.telemetry
      OUTPUT_STREAM: events.anomaly
      CONSUMER_GROUP: aiops-congestion-group
      CONSUMER_NAME: congestion-detector-01
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: events.anomaly
      INFLUXDB_ENABLED: "true"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
      INFLUX_MEASUREMENT: aiops_congestion
      STATE_PREFIX: aiops:congestion
      MODEL_REGISTRY_PATH: /mlops/models/registry.json
      MODEL_POLL_INTERVAL_SEC: ${MODEL_POLL_INTERVAL_SEC:-60}
      MODEL_NAME: congestion_5g
      MODEL_FORMAT: onnx_fp16
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
      CONGESTION_MODEL_PATH: /mlops/models/congestion_5g_lstm_traced.pt
      CONGESTION_PREPROCESSOR_PATH: /mlops/data/processed/preprocessor_congestion_5g.pkl
      CONGESTION_THRESHOLD: ${CONGESTION_THRESHOLD:-0.5}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
      normalizer:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379')), decode_responses=True).ping()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  slice-classifier:
    build:
      context: ..
      dockerfile: aiops-tier/slice-classifier/Dockerfile
    restart: unless-stopped
    volumes: *aiops-mlops-mounts
    environment:
      SERVICE_NAME: slice-classifier
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      INPUT_STREAM: stream:norm.telemetry
      OUTPUT_STREAM: events.slice.classification
      CONSUMER_GROUP: aiops-slice-group
      CONSUMER_NAME: slice-classifier-01
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: events.slice.classification
      INFLUXDB_ENABLED: "true"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
      INFLUX_MEASUREMENT: aiops_slice_classification
      STATE_PREFIX: aiops:slice_classification
      MODEL_REGISTRY_PATH: /mlops/models/registry.json
      MODEL_POLL_INTERVAL_SEC: ${MODEL_POLL_INTERVAL_SEC:-60}
      MODEL_NAME: slice_type_5g
      MODEL_FORMAT: onnx_fp16
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
      SLICE_MODEL_NAME: slice-type-lgbm-5g
      MLFLOW_DB_PATH: /mlops/mlflow.db
      MLRUNS_DIR: /mlops/mlruns
      SLICE_LABEL_ENCODER_PATH: /mlops/data/processed/label_encoder_slice_type_5g.pkl
      SLICE_MISMATCH_CONFIDENCE_THRESHOLD: ${SLICE_MISMATCH_CONFIDENCE_THRESHOLD:-0.8}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
      normalizer:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379')), decode_responses=True).ping()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  sla-assurance:
    build:
      context: ..
      dockerfile: aiops-tier/sla-assurance/Dockerfile
    restart: unless-stopped
    volumes: *aiops-mlops-mounts
    environment:
      SERVICE_NAME: sla-assurance
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      INPUT_STREAM: stream:norm.telemetry
      OUTPUT_STREAM: events.sla
      CONSUMER_GROUP: aiops-sla-group
      CONSUMER_NAME: sla-assurance-01
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: events.sla
      INFLUXDB_ENABLED: "true"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
      INFLUX_MEASUREMENT: aiops_sla
      STATE_PREFIX: aiops:sla
      MODEL_REGISTRY_PATH: /mlops/models/registry.json
      MODEL_POLL_INTERVAL_SEC: ${MODEL_POLL_INTERVAL_SEC:-60}
      MODEL_NAME: sla_5g
      MODEL_FORMAT: onnx_fp16
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
      SLA_MODEL_NAME: sla-xgboost-5g
      MLFLOW_DB_PATH: /mlops/mlflow.db
      MLRUNS_DIR: /mlops/mlruns
      SLA_SCALER_PATH: /mlops/data/processed/scaler_sla_5g.pkl
      SLA_RISK_THRESHOLD: ${SLA_RISK_THRESHOLD:-0.5}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started
      normalizer:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379')), decode_responses=True).ping()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  fault-engine:
    build:
      context: ..
      dockerfile: simulation-tier/fault-engine/Dockerfile
    <<: *python-service
    ports:
      - "${FAULT_ENGINE_PORT:-7004}:7004"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: fault-engine
      SCENARIOS_DIR: /scenarios
    depends_on:
      redis:
        condition: service_healthy

  simulator-core:
    build:
      context: ..
      dockerfile: simulation-tier/simulator-core/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-core
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      VES_ADAPTER_URL: http://adapter-ves:7001
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-ves:
        condition: service_started
      redis:
        condition: service_healthy

  simulator-edge:
    build:
      context: ..
      dockerfile: simulation-tier/simulator-edge/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-edge
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      NETCONF_ADAPTER_URL: http://adapter-netconf:7002
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-netconf:
        condition: service_started
      redis:
        condition: service_healthy

  simulator-ran:
    build:
      context: ..
      dockerfile: simulation-tier/simulator-ran/Dockerfile
    <<: *python-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: simulator-ran
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      VES_ADAPTER_URL: http://adapter-ves:7001
      TICK_INTERVAL_SEC: ${TICK_INTERVAL_SEC:-2.0}
      SIM_SPEED: ${SIM_SPEED:-60.0}
    depends_on:
      adapter-ves:
        condition: service_started
      redis:
        condition: service_healthy

  root-cause:
    build:
      context: ../agentic-ai-tier
      dockerfile: root-cause/Dockerfile
    ports:
      - "${RCA_AGENT_PORT:-7005}:7005"
    environment:
      PORT: "7005"
      # Inside containers, localhost is the container itself. Default to host gateway for local Ollama.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      RCA_OLLAMA_MODEL: ${RCA_OLLAMA_MODEL:-qwen2.5:3b-instruct}
      RCA_AGENT_MAX_RETRIES: ${RCA_AGENT_MAX_RETRIES:-3}
      RCA_ENABLE_HEURISTIC_FALLBACK: ${RCA_ENABLE_HEURISTIC_FALLBACK:-true}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-neuroslice}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-telemetry}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_started

  copilot-agent:
    build:
      context: ../agentic-ai-tier
      dockerfile: copilot-agent/Dockerfile
    ports:
      - "${COPILOT_AGENT_PORT:-7006}:7006"
    environment:
      PORT: "7006"
      # Inside containers, localhost is the container itself. Default to host gateway for local Ollama.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${COPILOT_OLLAMA_MODEL:-qwen2.5:3b-instruct}
      OLLAMA_TIMEOUT_SECONDS: ${COPILOT_OLLAMA_TIMEOUT_SECONDS:-60}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-neuroslice}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-telemetry}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_started

  api-bff-service:
    build:
      context: ..
      dockerfile: api-dashboard-tier/api-bff-service/Dockerfile
    <<: *python-service
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: api-bff-service
      SITE_ID: ${SITE_ID:-TT-SFAX-02}
      FAULT_ENGINE_URL: http://fault-engine:7004
    depends_on:
      normalizer:
        condition: service_started
      congestion-detector:
        condition: service_started
      slice-classifier:
        condition: service_started
      sla-assurance:
        condition: service_started
      fault-engine:
        condition: service_started

  telemetry-exporter:
    build:
      context: ..
      dockerfile: ingestion-tier/telemetry-exporter/Dockerfile
    <<: *python-service
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: telemetry-norm
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: neuroslice_token_12345
      INFLUXDB_ORG: neuroslice
      INFLUXDB_BUCKET: telemetry
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_started

  auth-service:
    build:
      context: ..
      dockerfile: api-dashboard-tier/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Keep this URL aligned with the postgres service credentials above.
      DATABASE_URL: postgresql+psycopg://auth_app:auth_password@postgres:5432/neuroslice_dashboard
      PORT: "8001"
      JWT_SECRET_KEY: super-secret-key
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: 7
      ARGON2_MEMORY_COST: 65536
      ARGON2_TIME_COST: 3
      ARGON2_PARALLELISM: 4
      REFRESH_COOKIE_NAME: neuroslice_refresh_token
      REFRESH_COOKIE_PATH: /api/auth
      REFRESH_COOKIE_SECURE: "false"
      REFRESH_COOKIE_SAMESITE: lax
      INITIAL_ADMIN_FULL_NAME: Admin NeuroSlice
      INITIAL_ADMIN_EMAIL: admin@neuroslice.tn
      INITIAL_ADMIN_PASSWORD: change-me-now
    expose:
      - "8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)); sys.exit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  dashboard-backend:
    build:
      context: ..
      dockerfile: api-dashboard-tier/dashboard-backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${DASHBOARD_DB_USER:-dashboard_app}:${DASHBOARD_DB_PASSWORD:-dashboard_password}@postgres:5432/${DASHBOARD_POSTGRES_DB:-neuroslice_dashboard}
      PORT: "8002"
      JWT_SECRET_KEY: ${DASHBOARD_JWT_SECRET}
      DASHBOARD_DATA_PROVIDER: ${DASHBOARD_DATA_PROVIDER:-temporary_mock}
      API_BFF_BASE_URL: http://api-bff-service:8000
      MLOPS_API_BASE_URL: http://mlops-api:8010
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
    expose:
      - "8002"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3)); sys.exit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kong-gateway:
    build:
      context: ..
      dockerfile: api-dashboard-tier/kong-gateway/Dockerfile
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "off"
    ports:
      - "${DASHBOARD_KONG_PORT:-8008}:8000"
    depends_on:
      auth-service:
        condition: service_healthy
      dashboard-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  react-dashboard:
    build:
      context: ..
      dockerfile: api-dashboard-tier/react-dashboard/Dockerfile
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_PROXY_TARGET: http://kong-gateway:8000
      VITE_AUTH_API_URL: /api/auth
      VITE_DASHBOARD_API_URL: /api/dashboard
    ports:
      - "${DASHBOARD_FRONTEND_PORT:-5173}:5173"
    depends_on:
      kong-gateway:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-neuroslice}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/neuroslice_overview.json
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

volumes:
  redis_data:
  grafana_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  influxdb_data:
  postgres_data:
  mlops_postgres_data:
  minio_data:
  es_data:
