input {
  http {
    host => "0.0.0.0"
    port => 8081
    ecs_compatibility => "v8"
    additional_codecs => {}
    codec => json {
      target => "[payload]"
    }
  }
}

filter {
  mutate {
    add_field => {
      "[event][dataset]" => "smart_slice.predictions"
      "[event][kind]" => "event"
      "[event][module]" => "smart_slice"
      "[observer][name]" => "neuroslice-logstash"
      "[observer][type]" => "logstash"
    }
  }

  if [payload][timestamp] {
    date {
      match => [ "[payload][timestamp]", "ISO8601" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  }

  if [payload][service] {
    mutate {
      replace => { "[service][name]" => "%{[payload][service]}" }
    }
  } else if [payload][model_name] {
    mutate {
      replace => { "[service][name]" => "%{[payload][model_name]}" }
    }
  }

  if [payload][message] {
    mutate {
      replace => { "message" => "%{[payload][message]}" }
    }
  } else if [payload][model_name] {
    mutate {
      replace => { "message" => "prediction logged for %{[payload][model_name]}" }
    }
  } else {
    mutate {
      replace => { "message" => "prediction event received" }
    }
  }

  if [payload][model_name] {
    mutate {
      copy => { "[payload][model_name]" => "[ml][model][name]" }
    }
  }
}

output {
  stdout {
    codec => rubydebug {
      metadata => true
    }
  }

  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]
    index => "smart-slice-predictions"
  }
}
