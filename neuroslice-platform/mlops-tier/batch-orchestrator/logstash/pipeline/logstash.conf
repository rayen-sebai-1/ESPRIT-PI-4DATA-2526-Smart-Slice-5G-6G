input {
  http {
    host => "0.0.0.0"
    port => 8081
    ecs_compatibility => "v8"
    additional_codecs => {}
    codec => plain {
      charset => "UTF-8"
    }
  }
}

filter {
  mutate {
    add_field => {
      "[event][dataset]" => "smart_slice.predictions"
      "[event][kind]" => "event"
      "[event][module]" => "smart_slice"
      "[observer][name]" => "neuroslice-logstash"
      "[observer][type]" => "logstash"
    }
  }

  json {
    source => "message"
    target => "[payload]"
    tag_on_failure => [ "_payload_json_parse_failure" ]
  }

  mutate {
    remove_tag => [ "_jsonparsefailure" ]
    copy => { "message" => "[payload][raw]" }
  }

  if [payload][@timestamp] {
    date {
      match => [ "[payload][@timestamp]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  } else if [payload][timestamp] {
    date {
      match => [ "[payload][timestamp]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  } else if [payload][time] {
    date {
      match => [ "[payload][time]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  } else if [payload][event_time] {
    date {
      match => [ "[payload][event_time]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  }

  ruby {
    code => '
      pick = lambda do |paths|
        selected = nil
        paths.each do |path|
          value = event.get(path)
          next if value.nil?
          if value.is_a?(String) && value.strip.empty?
            next
          end
          selected = value
          break
        end
        selected
      end

      service_name = pick.call([
        "[payload][service][name]",
        "[payload][service_name]",
        "[payload][service]",
        "[payload][source_service]"
      ])
      event.set("[service][name]", service_name.to_s) unless service_name.nil?

      model_name = pick.call([
        "[payload][ml][model]",
        "[payload][ml][model][name]",
        "[payload][model]",
        "[payload][model_name]"
      ])
      event.set("[ml][model]", model_name.to_s) unless model_name.nil?

      prediction = pick.call([
        "[payload][ml][prediction]",
        "[payload][prediction]",
        "[payload][prediction_label]",
        "[payload][label]",
        "[payload][result][prediction]"
      ])
      event.set("[ml][prediction]", prediction.to_s) unless prediction.nil?

      confidence = pick.call([
        "[payload][ml][confidence]",
        "[payload][confidence]",
        "[payload][probability]",
        "[payload][score]",
        "[payload][result][confidence]"
      ])

      unless confidence.nil?
        begin
          event.set("[ml][confidence]", Float(confidence))
        rescue StandardError
          event.tag("_ml_confidence_parse_failure")
        end
      end
    '
  }

  if [ml][model] {
    mutate {
      copy => { "[ml][model]" => "model" }
    }
  }

  if [ml][prediction] {
    mutate {
      copy => { "[ml][prediction]" => "prediction" }
    }
  }

  if [ml][confidence] {
    mutate {
      copy => { "[ml][confidence]" => "confidence" }
    }
  }

  if [payload][message] {
    mutate {
      replace => { "message" => "%{[payload][message]}" }
    }
  } else if [ml][prediction] and [ml][model] {
    mutate {
      replace => { "message" => "prediction=%{[ml][prediction]} model=%{[ml][model]}" }
    }
  } else {
    mutate {
      replace => { "message" => "prediction event received" }
    }
  }

  mutate {
    remove_field => [ "headers" ]
  }
}

output {
  stdout {
    codec => rubydebug {
      metadata => true
    }
  }

  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]
    index => "${ES_INDEX_NAME:smart-slice-predictions}"
  }
}
