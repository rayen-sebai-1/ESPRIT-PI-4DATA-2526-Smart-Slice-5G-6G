################################################################################
# Smart Slice – ML Prediction Ingestion Pipeline
# Logstash 8.x  |  ECS v8 compatible
################################################################################

input {
  http {
    host => "0.0.0.0"
    port => 8081
    ecs_compatibility => "v8"

    # Parse JSON directly into [payload] – avoids fields landing at root
    # and prevents type conflicts with numeric fields like confidence.
    codec => json {
      target => "[payload]"
      ecs_compatibility => "v8"
    }

    # CRITICAL: Override default additional_codecs so the HTTP plugin does
    # NOT apply its own json codec for Content-Type: application/json,
    # which would bypass our target => "[payload]" setting.
    additional_codecs => {}

    response_headers => {
      "Content-Type" => "application/json"
      "X-Pipeline"   => "smart-slice-predictions"
    }
  }
}

filter {

  ############################################################################
  # 1. ECS metadata
  ############################################################################
  mutate {
    add_field => {
      "[ecs][version]"      => "8.11"
      "[event][dataset]"    => "smart_slice.predictions"
      "[event][kind]"       => "event"
      "[event][category]"   => "web"
      "[event][type]"       => "info"
      "[event][module]"     => "smart_slice"
      "[event][action]"     => "ml-prediction"
      "[observer][name]"    => "neuroslice-logstash"
      "[observer][type]"    => "logstash"
      "[observer][version]" => "8.13.4"
    }
  }

  ############################################################################
  # 2. Preserve raw input as event.original
  #    Since codec target => "[payload]", all parsed fields are already
  #    under [payload]. We just need to store the raw JSON string.
  ############################################################################
  ruby {
    code => '
      payload = event.get("[payload]")
      if payload.is_a?(Hash)
        require "json"
        event.set("[event][original]", payload.to_json)
      elsif payload.is_a?(String)
        event.set("[event][original]", payload)
      end
    '
  }

  ############################################################################
  # 3. Remove any _jsonparsefailure tag the codec might inject
  ############################################################################
  mutate {
    remove_tag => [ "_jsonparsefailure" ]
  }

  ############################################################################
  # 4. Timestamp normalisation
  #    Try several common field names; fall back to ingest time (@timestamp
  #    is already set by Logstash).
  ############################################################################
  if [payload][@timestamp] {
    date {
      match => [ "[payload][@timestamp]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  } else if [payload][timestamp] {
    date {
      match => [ "[payload][timestamp]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  } else if [payload][time] {
    date {
      match => [ "[payload][time]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  } else if [payload][event_time] {
    date {
      match => [ "[payload][event_time]", "ISO8601", "UNIX_MS", "UNIX" ]
      target => "@timestamp"
      tag_on_failure => [ "_prediction_timestamp_parse_failure" ]
    }
  }

  ############################################################################
  # 5. event.ingested (always wall-clock ingest time)
  ############################################################################
  ruby {
    code => 'event.set("[event][ingested]", Time.now.utc.iso8601(3))'
  }

  ############################################################################
  # 6. Safe field extraction
  #    All incoming data is under [payload] thanks to target => "[payload]".
  #    We use simple conditionals — no crash-prone iteration or type coercion
  #    on unknown root fields.
  ############################################################################

  # --- service.name -------------------------------------------------------
  if [payload][service][name] {
    mutate { copy => { "[payload][service][name]" => "[service][name]" } }
  } else if [payload][service_name] {
    mutate { copy => { "[payload][service_name]" => "[service][name]" } }
  } else if [payload][service] {
    mutate { copy => { "[payload][service]" => "[service][name]" } }
  } else if [payload][source_service] {
    mutate { copy => { "[payload][source_service]" => "[service][name]" } }
  }

  # --- ml.model -----------------------------------------------------------
  if [payload][ml][model] {
    mutate { copy => { "[payload][ml][model]" => "[ml][model]" } }
  } else if [payload][ml][model][name] {
    mutate { copy => { "[payload][ml][model][name]" => "[ml][model]" } }
  } else if [payload][model] {
    mutate { copy => { "[payload][model]" => "[ml][model]" } }
  } else if [payload][model_name] {
    mutate { copy => { "[payload][model_name]" => "[ml][model]" } }
  }

  # --- ml.prediction ------------------------------------------------------
  if [payload][ml][prediction] {
    mutate { copy => { "[payload][ml][prediction]" => "[ml][prediction]" } }
  } else if [payload][prediction] {
    mutate { copy => { "[payload][prediction]" => "[ml][prediction]" } }
  } else if [payload][prediction_label] {
    mutate { copy => { "[payload][prediction_label]" => "[ml][prediction]" } }
  } else if [payload][label] {
    mutate { copy => { "[payload][label]" => "[ml][prediction]" } }
  } else if [payload][result][prediction] {
    mutate { copy => { "[payload][result][prediction]" => "[ml][prediction]" } }
  }

  # --- ml.confidence (safe float conversion) ------------------------------
  if [payload][ml][confidence] {
    mutate { copy => { "[payload][ml][confidence]" => "[ml][confidence]" } }
  } else if [payload][confidence] {
    mutate { copy => { "[payload][confidence]" => "[ml][confidence]" } }
  } else if [payload][probability] {
    mutate { copy => { "[payload][probability]" => "[ml][confidence]" } }
  } else if [payload][score] {
    mutate { copy => { "[payload][score]" => "[ml][confidence]" } }
  } else if [payload][result][confidence] {
    mutate { copy => { "[payload][result][confidence]" => "[ml][confidence]" } }
  }

  # Ensure ml.confidence is a float (mutate convert is safe with missing fields)
  if [ml][confidence] {
    mutate { convert => { "[ml][confidence]" => "float" } }
  }

  # --- ml.model_version ---------------------------------------------------
  if [payload][ml][model][version] {
    mutate { copy => { "[payload][ml][model][version]" => "[ml][model_version]" } }
  } else if [payload][model_version] {
    mutate { copy => { "[payload][model_version]" => "[ml][model_version]" } }
  } else if [payload][version] {
    mutate { copy => { "[payload][version]" => "[ml][model_version]" } }
  }

  # --- ml.model_type ------------------------------------------------------
  if [payload][ml][model][type] {
    mutate { copy => { "[payload][ml][model][type]" => "[ml][model_type]" } }
  } else if [payload][model_type] {
    mutate { copy => { "[payload][model_type]" => "[ml][model_type]" } }
  } else if [payload][task] {
    mutate { copy => { "[payload][task]" => "[ml][model_type]" } }
  }

  # --- correlation fields -------------------------------------------------
  if [payload][event_id] {
    mutate { copy => { "[payload][event_id]" => "event_id" } }
  } else if [payload][eventId] {
    mutate { copy => { "[payload][eventId]" => "event_id" } }
  } else if [payload][source_event_id] {
    mutate { copy => { "[payload][source_event_id]" => "event_id" } }
  } else if [payload][sourceEventId] {
    mutate { copy => { "[payload][sourceEventId]" => "event_id" } }
  }

  if ![event_id] {
    ruby {
      code => '
        require "securerandom"
        event.set("event_id", SecureRandom.uuid)
      '
    }
  }

  if [payload][slice_id] {
    mutate { copy => { "[payload][slice_id]" => "slice_id" } }
  } else if [payload][sliceId] {
    mutate { copy => { "[payload][sliceId]" => "slice_id" } }
  }

  if [payload][cell_id] {
    mutate { copy => { "[payload][cell_id]" => "cell_id" } }
  } else if [payload][cellId] {
    mutate { copy => { "[payload][cellId]" => "cell_id" } }
  }

  if [payload][gnb_id] {
    mutate { copy => { "[payload][gnb_id]" => "gnb_id" } }
  } else if [payload][gnbId] {
    mutate { copy => { "[payload][gnbId]" => "gnb_id" } }
  }

  if [payload][metric_name] {
    mutate { copy => { "[payload][metric_name]" => "metric_name" } }
  } else if [payload][metricName] {
    mutate { copy => { "[payload][metricName]" => "metric_name" } }
  }

  if [payload][metric_value] {
    mutate { copy => { "[payload][metric_value]" => "metric_value" } }
  } else if [payload][metricValue] {
    mutate { copy => { "[payload][metricValue]" => "metric_value" } }
  }

  if [payload][anomaly_score] {
    mutate { copy => { "[payload][anomaly_score]" => "anomaly_score" } }
  } else if [payload][anomalyScore] {
    mutate { copy => { "[payload][anomalyScore]" => "anomaly_score" } }
  } else if [payload][score] {
    mutate { copy => { "[payload][score]" => "anomaly_score" } }
  } else if [ml][confidence] {
    mutate { copy => { "[ml][confidence]" => "anomaly_score" } }
  }

  if [metric_value] {
    mutate { convert => { "metric_value" => "float" } }
  }
  if [anomaly_score] {
    mutate { convert => { "anomaly_score" => "float" } }
  }

  if [ml][prediction] {
    mutate { copy => { "[ml][prediction]" => "prediction" } }
  }

  if [service][name] {
    mutate { copy => { "[service][name]" => "source_service" } }
  } else if [payload][source_service] {
    mutate { copy => { "[payload][source_service]" => "source_service" } }
  } else if [payload][sourceService] {
    mutate { copy => { "[payload][sourceService]" => "source_service" } }
  } else if [payload][service_name] {
    mutate { copy => { "[payload][service_name]" => "source_service" } }
  } else if [payload][serviceName] {
    mutate { copy => { "[payload][serviceName]" => "source_service" } }
  } else {
    mutate { add_field => { "source_service" => "logstash" } }
  }

  if [payload][site_id] {
    mutate { copy => { "[payload][site_id]" => "site_id" } }
  } else if [payload][siteId] {
    mutate { copy => { "[payload][siteId]" => "site_id" } }
  }

  if [payload][domain] {
    mutate { copy => { "[payload][domain]" => "domain" } }
  } else {
    mutate { add_field => { "domain" => "ran" } }
  }

  if [payload][entity_id] {
    mutate { copy => { "[payload][entity_id]" => "entity_id" } }
  } else if [payload][entityId] {
    mutate { copy => { "[payload][entityId]" => "entity_id" } }
  } else if [cell_id] {
    mutate { copy => { "cell_id" => "entity_id" } }
  } else if [gnb_id] {
    mutate { copy => { "gnb_id" => "entity_id" } }
  } else if [slice_id] {
    mutate { copy => { "slice_id" => "entity_id" } }
  }

  if [payload][entity_type] {
    mutate { copy => { "[payload][entity_type]" => "entity_type" } }
  } else if [payload][entityType] {
    mutate { copy => { "[payload][entityType]" => "entity_type" } }
  } else if [cell_id] {
    mutate { add_field => { "entity_type" => "cell" } }
  } else if [gnb_id] {
    mutate { add_field => { "entity_type" => "gnb" } }
  } else {
    mutate { add_field => { "entity_type" => "gnb" } }
  }

  if [payload][kpis] {
    mutate { copy => { "[payload][kpis]" => "kpis" } }
  }

  ruby {
    code => '
      ts = event.get("@timestamp")
      event.set("timestamp", ts.time.utc.iso8601(3)) if ts

      if event.get("metric_name").nil?
        kpis = event.get("kpis")
        if kpis.is_a?(Hash)
          first_numeric = kpis.find { |_k, v| v.is_a?(Numeric) }
          if first_numeric
            event.set("metric_name", first_numeric[0].to_s)
            event.set("metric_value", first_numeric[1].to_f)
          end
        end
      end
    '
  }

  ############################################################################
  # 7. Friendly [message] field
  ############################################################################
  if [payload][message] {
    mutate {
      replace => { "message" => "%{[payload][message]}" }
    }
  } else if [ml][prediction] and [ml][model] {
    mutate {
      replace => { "message" => "prediction=%{[ml][prediction]} model=%{[ml][model]}" }
    }
  } else {
    mutate {
      replace => { "message" => "prediction event received" }
    }
  }

  ############################################################################
  # 8. Cleanup – remove HTTP-plugin injected fields
  ############################################################################
  mutate {
    remove_field => [ "headers", "[http]", "[url]", "[host]", "[user_agent]" ]
  }
}

output {
  stdout {
    codec => line {
      format => "{\"log_stage\":\"logstash_output\",\"event_id\":\"%{[event_id]}\",\"slice_id\":\"%{[slice_id]}\",\"timestamp\":\"%{[timestamp]}\",\"source_service\":\"%{[source_service]}\",\"prediction\":\"%{[prediction]}\"}"
    }
  }

  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]

    data_stream => true
    data_stream_type => "logs"
    data_stream_dataset => "smart_slice.predictions"
    data_stream_namespace => "default"

    ecs_compatibility => "v8"
  }

  http {
    url => "http://logstash-aiops-ingest:7014/ingest/logstash"
    http_method => "post"
    format => "json"
    content_type => "application/json"
    automatic_retries => 1
    retry_failed => true
    pool_max => 50
    request_timeout => 10
  }
}
