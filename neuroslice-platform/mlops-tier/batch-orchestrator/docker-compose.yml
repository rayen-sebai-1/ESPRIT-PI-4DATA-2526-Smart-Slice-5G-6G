services:
  api:
    build:
      context: .
      args:
        PYTORCH_INDEX: ${PYTORCH_INDEX:-cpu}
    ports:
      - "${API_PORT:-8010}:${API_PORT:-8010}"
    environment:
      API_PORT: "${API_PORT:-8010}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-minioadmin123}"
      MLFLOW_S3_ENDPOINT_URL: "${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}"
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI:-http://mlflow-server:5000}"
      MLFLOW_ARTIFACT_ROOT: "${MLFLOW_ARTIFACT_ROOT:-s3://mlflow-artifacts}"
      MLFLOW_EXPERIMENT_NAME: "${MLFLOW_EXPERIMENT_NAME:-neuroslice-aiops}"
      LOG_MONITORING_MODE: "${LOG_MONITORING_MODE:-logstash}"
      LOGSTASH_HTTP_URL: "${LOGSTASH_HTTP_URL:-http://logstash:8081/predictions}"
      ES_HOST: "${ES_HOST:-http://elasticsearch:9200}"
    depends_on:
      mlflow-server:
        condition: service_started
      logstash:
        condition: service_started
      elasticsearch:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "1.25"

  mlops-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${MLOPS_POSTGRES_USER:-mlflow}"
      POSTGRES_PASSWORD: "${MLOPS_POSTGRES_PASSWORD:-mlflow123}"
      POSTGRES_DB: "${MLOPS_POSTGRES_DB:-mlflow}"
    ports:
      - "${MLOPS_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLOPS_POSTGRES_USER:-mlflow} -d ${MLOPS_POSTGRES_DB:-mlflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do sleep 2; done &&
      mc mb --ignore-existing local/${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts} || true
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      MLFLOW_ARTIFACT_BUCKET: "${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    depends_on:
      mlops-postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-minioadmin123}"
      MLFLOW_S3_ENDPOINT_URL: "${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}"
      MLFLOW_BACKEND_STORE_URI: "${MLFLOW_BACKEND_STORE_URI:-}"
      MLFLOW_ARTIFACT_ROOT: "${MLFLOW_ARTIFACT_ROOT:-s3://mlflow-artifacts}"
      MLOPS_POSTGRES_USER: "${MLOPS_POSTGRES_USER:-mlflow}"
      MLOPS_POSTGRES_PASSWORD: "${MLOPS_POSTGRES_PASSWORD:-mlflow123}"
      MLOPS_POSTGRES_DB: "${MLOPS_POSTGRES_DB:-mlflow}"
    command: >
      /bin/sh -c "
      pip install --no-cache-dir boto3 psycopg2-binary &&
      BACKEND_URI=$${MLFLOW_BACKEND_STORE_URI:-postgresql+psycopg2://$${MLOPS_POSTGRES_USER:-mlflow}:$${MLOPS_POSTGRES_PASSWORD:-mlflow123}@mlops-postgres:5432/$${MLOPS_POSTGRES_DB:-mlflow}} &&
      mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri $$BACKEND_URI --default-artifact-root $$MLFLOW_ARTIFACT_ROOT
      "
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "1.25"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    depends_on:
      elasticsearch:
        condition: service_started
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      XPACK_MONITORING_ENABLED: "false"
    ports:
      - "8081:8081"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

volumes:
  postgres_data:
  minio_data:
  es_data: