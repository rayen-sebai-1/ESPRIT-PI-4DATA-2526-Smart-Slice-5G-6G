name: Smart Slice 5G/6G MLOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=120

      - name: Security scan (bandit)
        run: bandit -r src/ -ll

      - name: Preprocess and validate base 6G data
        run: |
          python src/data/preprocess_6g.py
          python src/data/validate.py

      - name: Preprocess and validate congestion-5g data
        run: |
          python src/data/preprocess_congestion_5g.py
          python src/data/validate_congestion_5g.py

      - name: Preprocess and validate SLA-5G data
        run: |
          python src/data/preprocess_sla_5g.py
          python src/data/validate_sla_5g.py

      - name: Preprocess and validate slice-type-5g data
        run: |
          python src/data/preprocess_slice_type_5g.py
          python src/data/validate_slice_type_5g.py

      - name: Preprocess and validate SLA-6G data
        run: |
          python src/data/preprocess_sla_6g.py
          python src/data/validate_sla_6g.py

      - name: Preprocess and validate slice-type-6g data
        run: |
          python src/data/preprocess_slice_type_6g.py
          python src/data/validate_slice_type_6g.py

      - name: Run unit and API tests
        run: pytest tests/ -v --ignore=tests/test_model_quality.py

      - name: Train congestion-6g LSTM
        run: python src/models/train_congestion_6g.py

      - name: Quality gate - congestion-6g (val_mae < 5.0)
        run: pytest tests/test_model_quality.py::TestModelQualityGates::test_congestion_6g_lstm_val_mae -v

      - name: Train congestion-5g LSTM
        run: python src/models/train_congestion_5g.py

      - name: Train SLA-5G XGBoost
        run: python src/models/train_sla_5g.py

      - name: Quality gate - SLA-5G (val_roc_auc >= 0.75)
        run: pytest tests/test_model_quality.py::TestModelQualityGates::test_sla_roc_auc -v

      - name: Train slice-type-5g LightGBM
        run: python src/models/train_slice_type_5g.py

      - name: Quality gate - slice-type-5g (val_accuracy >= 0.80)
        run: pytest tests/test_model_quality.py::TestModelQualityGates::test_slice_type_5g_accuracy -v

      - name: Train slice-type-6g XGBoost
        run: python src/models/train_slice_type_6g.py

      - name: Quality gate - slice-type-6g (val_accuracy >= 0.80)
        run: pytest tests/test_model_quality.py::TestModelQualityGates::test_slice_type_6g_accuracy -v

      - name: Train SLA-6G XGBoost
        run: python src/models/train_sla_6g.py

      - name: Quality gate - SLA-6G (val_roc_auc >= 0.75)
        run: pytest tests/test_model_quality.py::TestModelQualityGates::test_sla_6g_roc_auc -v

      - name: Build Docker image
        run: docker build -t smart-slice-api .
