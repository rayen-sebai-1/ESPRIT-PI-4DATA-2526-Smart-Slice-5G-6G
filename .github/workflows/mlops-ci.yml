name: MLOps CI/CD

on:
  push:
  pull_request:

env:
  MLOPS_DIR: neuroslice-platform/mlops-tier/batch-orchestrator

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1-5: format check, lint, and tests
  # ─────────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Format / Lint / Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: neuroslice-platform/mlops-tier/batch-orchestrator

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: neuroslice-platform/mlops-tier/batch-orchestrator/requirements.txt

      # 3. Install dependencies
      # Install CPU-only PyTorch first to avoid downloading the 2 GB+ CUDA wheel
      # in CI where a GPU is not available. The remaining requirements are
      # installed by filtering out the torch/CUDA lines from requirements.txt.
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          grep -vE '^(torch|torchvision|--extra-index-url)' requirements.txt \
            | pip install -r /dev/stdin

      # 4. Formatting check (black --check: reports diff, never rewrites)
      - name: Check code formatting with black
        run: black --check src/ tests/

      # 5. Linting
      - name: Lint with ruff
        run: ruff check src/ tests/

      # 6. Tests
      # Ignores tests that require live infrastructure (MLflow registry,
      # trained model artefacts on disk). All other tests run in-process
      # with mocks and in-memory data.
      - name: Run tests with pytest
        run: |
          pytest tests/ -v \
            --ignore=tests/test_model_lifecycle_registry.py \
            --ignore=tests/test_model_quality.py \
            --ignore=tests/test_model_report.py \
            --ignore=tests/test_log_sender.py \
            -x

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7-8: Docker image build (and optional push)
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 7. Build the FastAPI image
      # PYTORCH_INDEX=cpu keeps the image build fast in CI by pulling the ~500 MB
      # CPU wheel instead of the ~2.5 GB CUDA wheel. The production Dockerfile
      # defaults to cu126 when the build arg is omitted.
      - name: Build FastAPI Docker image
        run: |
          docker build \
            --build-arg PYTORCH_INDEX=cpu \
            -t mlops-fastapi:ci \
            ${{ env.MLOPS_DIR }}

      # 8. Push image — only on push to main AND only when registry secrets exist
      - name: Push Docker image to registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}
        run: |
          if [ -z "${DOCKER_USERNAME}" ]; then
            echo "DOCKER_USERNAME secret not set — skipping image push."
            exit 0
          fi
          echo "${DOCKER_PASSWORD}" | docker login "${DOCKER_REGISTRY}" \
            -u "${DOCKER_USERNAME}" --password-stdin
          REMOTE_TAG="${DOCKER_REGISTRY}/${DOCKER_USERNAME}/mlops-fastapi:latest"
          docker tag mlops-fastapi:ci "${REMOTE_TAG}"
          docker push "${REMOTE_TAG}"
          echo "Pushed ${REMOTE_TAG}"
